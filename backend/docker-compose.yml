services:
  db:
    image: postgres:16-alpine
    container_name: ptmaja-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-blogdb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1234}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-blogdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ptmaja-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
        required: false
    env_file:
      - .env
    environment:
      DB_HOST: ${LOCAL_DB_HOST:-db}
    ports:
      - "${API_PORT:-3000}:3000"

volumes:
  postgres_data:
