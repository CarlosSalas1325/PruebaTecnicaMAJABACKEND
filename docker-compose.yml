version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: ptmaja-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-blogdb}
      POSTGRES_USER: ${POSTGRES_USER:-bloguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-blogpass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bloguser} -d ${POSTGRES_DB:-blogdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ptmaja-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: db
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run migration:run && npm run seed && npm run dev"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ptmaja-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      PORT: ${FRONTEND_PORT:-4200}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:3000/api}
    ports:
      - "${FRONTEND_PORT:-4200}:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run start -- --host 0.0.0.0 --port 4200"

volumes:
  postgres_data:
